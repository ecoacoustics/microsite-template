# baseURL: https://development.ecosounds.org/
languageCode: en-US
title: Call Detective
server:
  headers:
    - for: /**
      values:
        Access-Control-Allow-Origin: "*"
        Cross-Origin-Opener-Policy: same-origin
        Cross-Origin-Embedder-Policy: require-corp
        Cross-Origin-Resource-Policy: cross-origin
        # CSP for local development - must be kept in sync with netlify.toml
        Content-Security-Policy-Report-Only: "default-src 'self'; script-src 'self' 'unsafe-eval' 'unsafe-inline' https://cdn.jsdelivr.net https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' data: https://*.ecosounds.org https://*.acousticobservatory.org https://cdn.jsdelivr.net https://www.google-analytics.com; media-src 'self' https://*.ecosounds.org https://*.acousticobservatory.org; frame-src 'none'; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';"
        ignoreLogs:
          - warning-goldmark-raw-html
module:
  hugoVersion:
    extended: false
    min: 0.116.0
markup:
  goldmark:
    renderer:
      unsafe: true
services:
  # https://gohugo.io/templates/embedded/#configuration-google-analytics
  # googleAnalytics:
  #   id: G-MEASUREMENT_ID
menus:
  # main:
  #   - name: Credits
  #     pageRef: https://ecosounds.org/about/credits
  #     weight: 10
  # footer:
  #   - name: Ecosounds Project
  #     pageRef: https://www.ecosounds.org/projects/1131
# Avoid camel casing params. Hugo downcases all params when it parses the config.
# We can still case-insensitively access params, but if we try to dump them as a json blob
# we will lose the camel casing which can be confusing later.
params:
  api_host: https://api.staging.ecosounds.org
  workbench_host: https://staging.ecosounds.org
  hero_image: images/Plains_wanderer_female.jpg
  # navbar:
  #   logo:
  #     image: "images/OpenEcoacoustics_horizontal_rgb.svg" # default: none
  #     text: "Call Detective" # default: {{ .site.Title }}
  # To add stakeholder logos to the footer, uncomment and configure below:
  # sponsors:
  #   logos:
  #     - image: "images/OpenEcoacoustics_horizontal_rgb.svg"
  #       alt: "Open Ecoacoustics Logo"
  #       url: "https://stakeholder.org/"
  tasks:
    verification: true # default: true
  campaigns:
    - name: "Powerful Owl"
      filters:
        filter:
          tags.text:
            eq: "Powerful Owl"
    - name: "Australian Brush-turkey"
      filters:
        filter:
          tags.text:
            eq: "Australian Brush-turkey"
  style:
    xsmallBreakPoint: 425px
    smallBreakPoint: 768px
    mediumBreakPoint: 1024px
    largeBreakPoint: 1200px
    roundedButtons: true
    # Theme colors are defined using "hsl" (hue, saturation, lightness).
    # To create your own hsl theme color, you can use the following website.
    # https://hslpicker.com/#ca7d2f
    themeColor:
      hue: 30deg
      saturation: 62%
      lightness: 49%
    # TODO: We should derive the theme shades from the ThemeColor so that we
    # don't have to explicitly define every theme color shade.
    # https://github.com/ecoacoustics/microsite-template/issues/49
    #
    # In the interim, you can create theme colors using the shoelace color
    # token generator.
    # https://codepen.io/claviska/full/QWveRgL
    themeShades:
      "50": 252 249 245
      "100": 247 234 222
      "200": 240 219 196
      "300": 233 201 168
      "400": 224 177 130
      "500": 211 146 80
      "600": 186 115 44
      "700": 153 95 36
      "800": 126 78 30
      "900": 90 56 21
      "950": 55 34 13
